<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业务动态管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="app" v-cloak class="max-w-6xl mx-auto p-4 md:p-8">
        <nav class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black text-slate-800">INSIGHT HUB<span class="text-indigo-600">.</span></h1>
            <button @click="showAdmin = !showAdmin" class="text-xs font-bold text-slate-400 hover:text-indigo-600 transition">
                {{ showAdmin ? '退出管理模式' : '进入管理模式' }}
            </button>
        </nav>

        <div v-if="showAdmin" class="bg-indigo-900 text-white p-6 rounded-3xl mb-8 shadow-xl">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">🚀 新闻录入助手 <span class="text-[10px] bg-indigo-500 px-2 py-0.5 rounded">仅供内部更新使用</span></h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-2">
                        <select v-model="newItem.region" class="bg-indigo-800 border-none rounded-xl p-2 text-sm text-white">
                            <option>美国</option><option>亚太</option>
                        </select>
                        <select v-model="newItem.topic" class="bg-indigo-800 border-none rounded-xl p-2 text-sm text-white">
                            <option>新闻</option><option>社区活动</option><option>竞品动态</option>
                        </select>
                    </div>
                    <input v-model="newItem.title" placeholder="输入标题" class="w-full bg-indigo-800 border-none rounded-xl p-2 text-sm placeholder-indigo-400">
                    <textarea v-model="newItem.content" placeholder="输入内容" rows="2" class="w-full bg-indigo-800 border-none rounded-xl p-2 text-sm placeholder-indigo-400"></textarea>
                    <textarea v-model="newItem.value" placeholder="输入业务价值" rows="2" class="w-full bg-indigo-800 border-none rounded-xl p-2 text-sm placeholder-indigo-400"></textarea>
                    <button @click="generateNewJson" class="w-full bg-white text-indigo-900 py-3 rounded-xl font-bold hover:bg-indigo-50 transition">
                        点击生成并复制最新数据
                    </button>
                </div>
                <div class="relative">
                    <label class="text-[10px] font-bold text-indigo-300 block mb-2 uppercase">预览：准备更新至 GitHub 的数据</label>
                    <pre class="bg-black/30 p-4 rounded-2xl text-[10px] h-[200px] overflow-auto text-emerald-400 leading-tight">[[ {{ newItem }} , ...旧数据]]</pre>
                </div>
            </div>
        </div>

        <div class="flex flex-wrap gap-4 mb-8">
            <button v-for="r in ['全部', '美国', '亚太']" @click="filter.region = r" 
                :class="['px-4 py-2 rounded-xl text-sm transition', filter.region === r ? 'bg-slate-800 text-white' : 'bg-white shadow-sm text-slate-500']">{{r}}</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div v-for="item in filteredItems" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex gap-2 mb-2">
                    <span class="text-[10px] px-2 py-0.5 rounded bg-slate-100 text-slate-500">{{item.region}}</span>
                    <span class="text-[10px] px-2 py-0.5 rounded bg-indigo-50 text-indigo-600">{{item.topic}}</span>
                </div>
                <h3 class="font-bold mb-2">{{item.title}}</h3>
                <p class="text-xs text-slate-500 leading-relaxed mb-4">{{item.content}}</p>
                <div class="bg-amber-50 p-3 rounded-xl">
                    <p class="text-[10px] font-bold text-amber-700">💡 业务价值</p>
                    <p class="text-[11px] text-amber-900 mt-1">{{item.value}}</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        createApp({
            setup() {
                const items = ref([]);
                const showAdmin = ref(false);
                const filter = ref({ region: '全部', topic: '全部' });
                const newItem = ref({ region: '美国', topic: '新闻', title: '', content: '', value: '' });

                onMounted(async () => {
                    const res = await fetch(`data.json?t=${Date.now()}`);
                    items.value = await res.json();
                });

                const filteredItems = computed(() => {
                    return items.value.filter(item => {
                        const r = filter.value.region === '全部' || item.region === filter.value.region;
                        const t = filter.value.topic === '全部' || item.topic === filter.value.topic;
                        return r && t;
                    });
                });

                // 核心功能：生成新 JSON 并复制到剪贴板
                const generateNewJson = () => {
                    if (!newItem.value.title) return alert('标题不能为空');
                    
                    // 把新内容放在最前面
                    const updatedData = [
                        { id: Date.now(), ...newItem.value },
                        ...items.value
                    ];
                    
                    const jsonString = JSON.stringify(updatedData, null, 2);
                    
                    // 复制到剪贴板
                    navigator.clipboard.writeText(jsonString).then(() => {
                        alert('✨ 最新 JSON 数据已复制到剪贴板！\n请去 GitHub 的 data.json 全选并粘贴覆盖。');
                        // 实时更新页面预览
                        items.value = updatedData;
                        newItem.value = { region: '美国', topic: '新闻', title: '', content: '', value: '' };
                    });
                };

                return { items, filter, filteredItems, showAdmin, newItem, generateNewJson };
            }
        }).mount('#app');
    </script>
</body>
</html>
